<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Modern Glass UI</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="icon" href="download (1).jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Videos -->
    <div id="bg-videos" aria-hidden="true">
        <video data-weather="sunny" muted loop playsinline preload="auto" src="videos/sunny.mp4"></video>
        <video data-weather="rainy" muted loop playsinline preload="auto" src="videos/rainy.mp4"></video>
        <video data-weather="cloudy" muted loop playsinline preload="auto" src="videos/cloudy.mp4"></video>
        <video data-weather="snowy" muted loop playsinline preload="auto" src="videos/snowy.mp4"></video>
    </div>

    <div class="container">
        <!-- Search Section -->
        <div class="search-section glass-effect">
            <div class="glass-shine"></div>
            <h1 class="app-title">
                <i class="fas fa-cloud-sun-rain icon-gradient"></i>
                <span class="title-text">Weather Dashboard</span>
            </h1>
            <p class="app-subtitle">Get real-time weather information for any city worldwide</p>
            <div class="search-box">
                <div class="search-input-wrapper">
                    <i class="fas fa-map-marker-alt search-icon"></i>
                    <input type="text" id="cityName" placeholder="Enter city name..." onkeypress="if(event.key==='Enter') searchWeather()">
                </div>
                <button class="btn btn-search" onclick="searchWeather()">
                    <i class="fas fa-search"></i>
                    <span>Search</span>
                </button>
            </div>
        </div>

        <!-- Weather Results - Initially Hidden -->
        <div id="weatherResults" style="display: none;">
            
            <!-- Main Weather Display -->
            <div class="main-weather glass-effect">
                <div class="glass-shine"></div>
                <div class="weather-display">
                    <div class="location-header">
                        <div class="location-info-top">
                            <h2 id="cityName-display"></h2>
                            <p id="location-details"></p>
                        </div>
                        <div class="time-info">
                            <i class="far fa-clock"></i>
                            <span id="localTime"></span>
                        </div>
                    </div>
                    
                    <div class="weather-current">
                        <div class="weather-left">
                            <div class="weather-icon-large" id="weatherIcon"></div>
                            <h3 id="conditionText"></h3>
                        </div>
                        <div class="weather-right">
                            <div class="temperature-large" id="temperature"></div>
                            <div class="feels-like">Feels like <span id="feelsLike"></span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Weather Details Grid -->
            <div class="weather-grid">
                <div class="weather-card glass-effect">
                    <div class="glass-shine"></div>
                    <div class="card-icon"><i class="fas fa-wind"></i></div>
                    <div class="card-label">Wind Speed</div>
                    <div class="card-value" id="windSpeed"></div>
                    <div class="card-sub" id="windDir"></div>
                </div>

                <div class="weather-card glass-effect">
                    <div class="glass-shine"></div>
                    <div class="card-icon"><i class="fas fa-tint"></i></div>
                    <div class="card-label">Humidity</div>
                    <div class="card-value" id="humidity"></div>
                </div>

                <div class="weather-card glass-effect">
                    <div class="glass-shine"></div>
                    <div class="card-icon"><i class="fas fa-gauge-high"></i></div>
                    <div class="card-label">Pressure</div>
                    <div class="card-value" id="pressure"></div>
                </div>

                <div class="weather-card glass-effect">
                    <div class="glass-shine"></div>
                    <div class="card-icon"><i class="fas fa-eye"></i></div>
                    <div class="card-label">Visibility</div>
                    <div class="card-value" id="visibility"></div>
                </div>

                <div class="weather-card glass-effect">
                    <div class="glass-shine"></div>
                    <div class="card-icon"><i class="fas fa-cloud"></i></div>
                    <div class="card-label">Cloud Cover</div>
                    <div class="card-value" id="cloud"></div>
                </div>

                <div class="weather-card glass-effect">
                    <div class="glass-shine"></div>
                    <div class="card-icon"><i class="fas fa-sun"></i></div>
                    <div class="card-label">UV Index</div>
                    <div class="card-value" id="uv"></div>
                </div>

                <div class="weather-card glass-effect">
                    <div class="glass-shine"></div>
                    <div class="card-icon"><i class="fas fa-droplet"></i></div>
                    <div class="card-label">Precipitation</div>
                    <div class="card-value" id="precip"></div>
                </div>

                 <div class="weather-card glass-effect">
                    <div class="glass-shine"></div>
                    <div class="card-icon"><i class="fas fa-temperature-half"></i></div>
                    <div class="card-label">Dew Point</div>
                    <div class="card-value" id="dewpoint"></div>
                </div>
            </div>

            <!-- Country Information Section -->
            <div class="country-section glass-effect">
                <div class="glass-shine"></div>
                <h2 class="section-title">
                    <i class="fas fa-globe-americas"></i>
                    Country Information
                </h2>
                <div class="country-content">
                    <div class="country-header">
                        <div id="countryFlag" class="country-flag"></div>
                        <div class="country-main-info">
                            <h3 id="countryName"></h3>
                            <p id="countryCapital"></p>
                        </div>
                    </div>
                    
                    <div class="country-details-grid">
                        <div class="country-detail">
                            <i class="fas fa-signature"></i>
                            <div>
                                <span class="detail-label">Official Name</span>
                                <span class="detail-value" id="officialName">-</span>
                            </div>
                        </div>
                        <div class="country-detail">
                            <i class="fas fa-language"></i>
                            <div>
                                <span class="detail-label">Languages</span>
                                <span class="detail-value" id="languages">-</span>
                            </div>
                        </div>
                        <div class="country-detail">
                            <i class="fas fa-users"></i>
                            <div>
                                <span class="detail-label">Population</span>
                                <span class="detail-value" id="population">-</span>
                            </div>
                        </div>
                        <div class="country-detail">
                            <i class="fas fa-map"></i>
                            <div>
                                <span class="detail-label">Region</span>
                                <span class="detail-value" id="regionCountry">-</span>
                            </div>
                        </div>
                        <div class="country-detail">
                            <i class="fas fa-dollar-sign"></i>
                            <div>
                                <span class="detail-label">Currency</span>
                                <span class="detail-value" id="currency">-</span>
                            </div>
                        </div>
                        <div class="country-detail">
                            <i class="fas fa-clock"></i>
                            <div>
                                <span class="detail-label">Timezone</span>
                                <span class="detail-value" id="timezoneCountry">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
